<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tamilan School · Exam Management (Manual ID + Auto Fill)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(238,242,249,1) 0%, rgba(224,232,242,1) 100%);
            padding: 32px;
            min-height: 100vh;
            background-image: url('/img/jeshoots-com--2vD8lIhdnw-unsplash.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
            z-index: -1;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .card {
            border: none;
            border-radius: 32px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            margin-bottom: 32px;
            transition: transform 0.25s ease;
        }
        .card:hover { transform: translateY(-4px); }
        .card-header {
            background: linear-gradient(115deg, #0f2c3d 0%, #1b4f6e 100%);
            border-bottom: 4px solid #f5b042;
            padding: 1.2rem 2rem;
            color: white;
            font-weight: 700;
            font-size: 1.5rem;
        }
        .card-header i { margin-right: 12px; color: #f5b042; }
        .card-body { padding: 2rem; }
        label {
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            color: #1e3a5f;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label i { width: 20px; color: #5b8caf; }
        .form-control, .form-select {
            border-radius: 44px;
            border: 1.5px solid #e2edf2;
            padding: 10px 18px;
            width: 100%;
            font-size: 0.9rem;
            background-color: #ffffff;
        }
        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
            outline: none;
        }
        .form-control[readonly] {
            background-color: #f8fafc;
            cursor: not-allowed;
            border-color: #cbd5e1;
        }
        .btn-primary {
            background: linear-gradient(105deg, #1f6392, #0e4a70);
            border: none;
            border-radius: 44px;
            padding: 10px 32px;
            font-weight: 600;
        }
        .btn-primary:hover { background: linear-gradient(105deg, #0e4a70, #0a3a57); transform: translateY(-2px); }
        .btn-secondary {
            background: #f1f5f9;
            color: #1e293b;
            border: 1px solid #cbd5e1;
            border-radius: 44px;
            padding: 10px 28px;
        }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-close-custom {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 44px;
            padding: 10px 28px;
        }
        .btn-close-custom:hover { background: #dc2626; }
        .table thead tr { background: #f1f5f9; }
        .table thead th {
            color: #1e293b;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 1rem 0.75rem;
            white-space: nowrap;
            border-bottom: 2px solid #e2e8f0;
        }
        .table tbody tr:hover { background: #fef9e6; }
        .badge-pass { background: #10b981; color: white; padding: 4px 14px; border-radius: 40px; font-weight: 600; font-size: 0.7rem; }
        .badge-fail { background: #ef4444; color: white; padding: 4px 14px; border-radius: 40px; font-weight: 600; font-size: 0.7rem; }
        .btn-sm.btn-primary, .btn-sm.btn-danger {
            border: none;
            margin: 0 3px;
            border-radius: 30px;
            padding: 0.35rem 0.9rem;
            font-weight: 500;
        }
        .btn-sm.btn-primary { background: #eef2ff; color: #1f6392; }
        .btn-sm.btn-primary:hover { background: #1f6392; color: white; }
        .btn-sm.btn-danger { background: #fff1f2; color: #b91c2c; }
        .btn-sm.btn-danger:hover { background: #b91c2c; color: white; }
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 320px;
            border-radius: 60px;
            animation: slideInRight 0.3s ease-out;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .alert-success { background: linear-gradient(105deg, #10b981, #059669); color: white; }
        .alert-danger { background: linear-gradient(105deg, #ef4444, #dc2626); color: white; }
        .card-footer {
            background: #fefefe;
            border-top: 1px solid #eef2f8;
            font-size: 0.75rem;
            padding: 0.75rem 1.5rem;
        }
        @media (max-width: 768px) {
            body { padding: 16px; }
            .alert { min-width: 260px; right: 10px; top: 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle"></i> [[${msg}]]
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${err}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-triangle"></i> [[${err}]]
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-header">
            <i class="fas fa-plus-circle"></i> <span id="formTitle">Add Exam Record</span>
        </div>
        <div class="card-body">
            <form method="post" action="/saveExamData" id="examForm">
                <div class="row g-4">
                    <div class="col-md-4">
                        <label><i class="fas fa-id-card"></i> Exam ID </label>
                        <input type="text" name="id" id="examId" class="form-control" placeholder="e.g., 720310401..." required autocomplete="off">
                    </div>
                    <div class="col-md-4">
                        <label><i class="fas fa-user"></i> Student ID</label>
                        <input type="text" id="studentRollId" class="form-control" placeholder="Enter Student ID (e.g., R01)" autocomplete="off">
                    </div>
                    <div class="col-md-4">
                        <label><i class="fas fa-user-graduate"></i> Student Name (Auto-filled)</label>
                        <input type="text" name="name" id="studentName" class="form-control"  required>
                    </div>
                    <div class="col-md-4">
                        <label><i class="fas fa-file-alt"></i> Exam Type</label>
                        <select name="etype" id="etype" class="form-select" required>
                            <option value="" disabled selected>-- Select --</option>
                            <option>Quarterly</option><option>Half Yearly</option><option>Annual</option><option>Unit Test</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label><i class="fas fa-book"></i> Subject</label>
                        <select name="subject" id="subject" class="form-select" required>
                            <option value="" disabled selected>-- Select Subject --</option>
                            <option>Tamil</option><option>English</option><option>Mathematics</option>
                            <option>Science</option><option>Social Science</option><option>Computer Science</option>
                            <option>Physics</option><option>Chemistry</option><option>Biology</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label><i class="fas fa-calendar-alt"></i> Date</label>
                        <input type="date" name="date" id="date" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label><i class="fas fa-clock"></i> Time</label>
                        <input type="time" name="time" id="time" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label><i class="fas fa-users"></i> Section (Auto-filled)</label>
                        <select name="section" id="section" class="form-select" required>
                            <option value="" disabled selected>-- Select --</option>
                            <option>A</option><option>B</option><option>C</option><option>D</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label><i class="fas fa-chart-line"></i> Total Marks</label>
                        <input type="number" step="1" name="tmark" id="tmark" class="form-control" required placeholder="e.g., 100">
                    </div>
                    <div class="col-md-4">
                        <label><i class="fas fa-check-circle"></i> Marks Obtained</label>
                        <input type="number" step="1" name="mark" id="mark" class="form-control" required placeholder="e.g., 85">
                    </div>
                    <div class="col-md-3">
                        <label><i class="fas fa-star"></i> Grade (Auto)</label>
                        <select name="grade" id="grade" class="form-select" disabled style="background-color:#f8fafc;">
                            <option>-- Calculated --</option>
                        </select>
                        <input type="hidden" name="grade" id="gradeHidden">
                    </div>
                    <div class="col-md-3">
                        <label><i class="fas fa-flag-checkered"></i> Status (Auto)</label>
                        <select name="status" id="status" class="form-select" disabled style="background-color:#f8fafc;">
                            <option>-- Calculated --</option>
                        </select>
                        <input type="hidden" name="status" id="statusHidden">
                    </div>
                </div>
                <div class="mt-4 d-flex justify-content-center gap-3 flex-wrap">
                    <button type="button" class="btn btn-close-custom" onclick="window.location.href='/#modules'">
                        <i class="fas fa-times me-2"></i> Close
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="clearForm()">
                        <i class="fas fa-undo-alt me-2"></i> Clear
                    </button>
                    <button type="submit" id="submitBtn" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i> Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <i class="fas fa-file-alt"></i> Exam Records
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle mb-0" id="examTable">
                    <thead>
                        <tr>
                            <th>No</th><th>Exam ID</th><th>Student Name</th><th>Exam Type</th><th>Subject</th>
                            <th>Date</th><th>Time</th><th>Section</th><th>Total</th><th>Obtained</th>
                            <th>Grade</th><th>Status</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="e, stat : ${exam}">
                            <td th:text="${stat.count}">1</td>
                            <td th:text="${e.id}">E001</td>
                            <td th:text="${e.name}">John Doe</td>
                            <td th:text="${e.etype}">Quarterly</td>
                            <td th:text="${e.subject}">Mathematics</td>
                            <td th:text="${e.date}">2025-04-16</td>
                            <td class="time-cell" th:text="${e.time}">10:00</td>
                            <td th:text="${e.section}">A</td>
                            <td th:text="${e.tmark}">100</td>
                            <td th:text="${e.mark}">85</td>
                            <td th:text="${e.grade}">A</td>
                            <td>
                                <span class="badge-pass" th:if="${e.status == 'Pass'}" th:text="${e.status}">Pass</span>
                                <span class="badge-fail" th:unless="${e.status == 'Pass'}" th:text="${e.status}">Fail</span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-sm btn-primary" title="Edit" th:onclick="editExam([[${e}]])"><i class="fas fa-edit"></i> Edit</button>
                                    <a th:href="@{/exam/delete/{id}(id=${e.id})}" class="btn btn-sm btn-danger" title="Delete" onclick="return confirm('Are you sure?')"><i class="fas fa-trash-alt"></i> Delete</a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(exam)}">
                            <td colspan="13" class="text-center py-4 text-muted">No exam records found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-between">
            <span><i class="fas fa-clock"></i> Last updated: <span th:text="${#dates.format(#dates.createNow(), 'dd-MM-yyyy HH:mm')}"></span></span>
            <span><i class="fas fa-list-check"></i> Total records: <span th:text="${#lists.size(exam)}">0</span></span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let isEditMode = false;
    let editingId = null;

    function setSelectValue(selectEl, value) {
        if (!value) return;
        for (let i = 0; i < selectEl.options.length; i++) {
            if (selectEl.options[i].value === value) {
                selectEl.selectedIndex = i;
                break;
            }
        }
    }

    async function fetchStudentData(rollId) {
        if (!rollId) return false;
        try {
            const response = await fetch(`/getStudentData/${rollId}`);
            if (response.ok) {
                const data = await response.json();
                document.getElementById('studentName').value = data.name || '';
                setSelectValue(document.getElementById('section'), data.section);
                return true;
            } else if (response.status === 404) {
                alert('Roll Number not found in student records. Please enter a valid Roll Number.');
                document.getElementById('studentName').value = '';
                document.getElementById('section').selectedIndex = 0;
                return false;
            } else {
                alert('Error fetching student data.');
                return false;
            }
        } catch (error) {
            console.error("Fetch error:", error);
            alert('Could not connect to server.');
            return false;
        }
    }

    document.getElementById('studentRollId').addEventListener('blur', function() {
        if (!isEditMode) {
            const id = this.value.trim();
            if (id) fetchStudentData(id);
        }
    });

    function calculateGradeAndStatus() {
        const total = parseFloat(document.getElementById('tmark').value) || 0;
        const obtained = parseFloat(document.getElementById('mark').value) || 0;
        let percentage = total > 0 ? (obtained / total) * 100 : 0;
        let grade = '';
        let status = '';

        if (percentage >= 90) grade = 'A+';
        else if (percentage >= 80) grade = 'A';
        else if (percentage >= 70) grade = 'B+';
        else if (percentage >= 60) grade = 'B';
        else if (percentage >= 50) grade = 'C';
        else if (percentage >= 40) grade = 'D';
        else if (percentage >= 35) grade = 'E';
        else grade = 'F';

        status = (grade !== 'F') ? 'Pass' : 'Fail';

        document.getElementById('gradeHidden').value = grade;
        document.getElementById('statusHidden').value = status;
        document.getElementById('grade').innerHTML = `<option>${grade}</option>`;
        document.getElementById('status').innerHTML = `<option>${status}</option>`;
    }

    function clearForm() {
        isEditMode = false;
        editingId = null;
        document.getElementById('formTitle').innerHTML = 'Add Exam Record';
        document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save me-2"></i> Save';
        document.getElementById('examId').value = '';
        document.getElementById('examId').readOnly = false;
        document.getElementById('studentRollId').value = '';
        document.getElementById('studentName').value = '';
        document.getElementById('etype').value = '';
        document.getElementById('subject').value = '';
        document.getElementById('date').value = '';
        document.getElementById('time').value = '';
        document.getElementById('section').selectedIndex = 0;
        document.getElementById('tmark').value = '';
        document.getElementById('mark').value = '';
        calculateGradeAndStatus();
        document.getElementById('examId').focus();
    }

    function editExam(e) {
        isEditMode = true;
        editingId = e.id;
        document.getElementById('formTitle').innerHTML = 'Edit Exam Record';
        document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save me-2"></i> Update';
        document.getElementById('examId').value = e.id;
        document.getElementById('examId').readOnly = true;
        document.getElementById('studentRollId').value = '';
        document.getElementById('studentName').value = e.name;
        document.getElementById('etype').value = e.etype;
        document.getElementById('subject').value = e.subject;
        document.getElementById('date').value = e.date;
        document.getElementById('time').value = e.time;
        setSelectValue(document.getElementById('section'), e.section);
        document.getElementById('tmark').value = e.tmark;
        document.getElementById('mark').value = e.mark;
        calculateGradeAndStatus();
        document.querySelector('.card-body').scrollIntoView({ behavior: 'smooth' });
    }

    function formatTimeToAMPM(time24) {
        if (!time24) return '';
        let [hours, minutes] = time24.split(':');
        let hour = parseInt(hours);
        let ampm = hour >= 12 ? 'PM' : 'AM';
        let hour12 = hour % 12;
        if (hour12 === 0) hour12 = 12;
        return `${hour12}:${minutes} ${ampm}`;
    }

    function formatAllTimes() {
        document.querySelectorAll('#examTable .time-cell').forEach(cell => {
            const raw = cell.innerText.trim();
            if (raw) cell.innerText = formatTimeToAMPM(raw);
        });
    }

    function attachAutoEvents() {
        const totalField = document.getElementById('tmark');
        const obtainedField = document.getElementById('mark');
        const events = ['input', 'change'];
        [totalField, obtainedField].forEach(field => {
            events.forEach(ev => field.removeEventListener(ev, calculateGradeAndStatus));
            events.forEach(ev => field.addEventListener(ev, calculateGradeAndStatus));
        });
    }

    setTimeout(() => {
        document.querySelectorAll('.alert').forEach(alert => {
            let bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
            bsAlert.close();
        });
    }, 5000);

    window.onload = function() {
        clearForm();
        attachAutoEvents();
        formatAllTimes();
    };
</script>
</body>
</html>
